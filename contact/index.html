<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – Small Shop Tees</title>
<meta name="description" content="Get in touch with Small Shop Tees. We respond to every inquiry within 1 business day.">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --black: #000000;
  --yellow: #FFD700;
  --white: #FFFFFF;
  --card-bg: #D9D9D9;
  --gradient: linear-gradient(90deg, #FF00FF 0%, #FF8C00 50%, #0000FF 100%);
}
body {
  background: var(--black);
  color: var(--white);
  font-family: 'Open Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* ── CONTACT CARD ──
   Canva spec: top=129, left=104, width=1157, height=594
   Light gray rounded-rectangle card centered on black bg
   with ~100px margins on each side
── */
.contact-card {
  background: var(--card-bg);
  border-radius: 24px;
  width: 100%;
  max-width: 1157px;
  padding: 48px 56px 52px;
  position: relative;
}

/* "CONTACT" heading — pixel font in BLACK (on light bg) */
.contact-heading {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(1.4rem, 4vw, 3.5rem);
  color: var(--black);
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 44px;
  line-height: 1.3;
}

/* Three-column top row: NAME | EMAIL | BUSINESS NAME */
.form-top-row {
  display: grid;
  grid-template-columns: 230px 1fr 322px;
  gap: 20px;
  margin-bottom: 32px;
  align-items: end;
}

.form-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-label {
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--black);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.form-input {
  background: var(--white);
  border: none;
  border-radius: 6px;
  padding: 18px 14px;
  font-family: 'Open Sans', sans-serif;
  font-size: 0.95rem;
  color: #222;
  outline: none;
  width: 100%;
  transition: box-shadow 0.2s;
}
.form-input:focus {
  box-shadow: 0 0 0 2px rgba(0,0,0,0.25);
}

/* INQUIRY label + textarea */
.inquiry-label {
  font-family: 'Open Sans', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--black);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.form-textarea {
  background: var(--white);
  border: none;
  border-radius: 6px;
  padding: 18px 14px;
  font-family: 'Open Sans', sans-serif;
  font-size: 0.95rem;
  color: #222;
  outline: none;
  width: 100%;
  min-height: 220px;
  resize: vertical;
  transition: box-shadow 0.2s;
  display: block;
}
.form-textarea:focus {
  box-shadow: 0 0 0 2px rgba(0,0,0,0.25);
}

/* Submit button */
.form-submit-wrap {
  display: flex;
  justify-content: center;
  margin-top: 32px;
}
.btn-submit {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem;
  color: var(--white);
  background: var(--black);
  border: none;
  padding: 20px 60px;
  border-radius: 50px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-submit:hover { opacity: 0.82; transform: translateY(-2px); }

/* Success/error messages */
.form-msg {
  text-align: center;
  margin-top: 20px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.45rem;
  letter-spacing: 1px;
  line-height: 2;
  display: none;
}
.form-msg.success { color: #1a7f37; display: block; }
.form-msg.error   { color: #cf222e; display: block; }

/* Back to home link */
.back-link {
  margin-top: 32px;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.38rem;
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  letter-spacing: 1px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--yellow); }

/* ── MOBILE ── */
@media (max-width: 800px) {
  .contact-card { padding: 36px 24px 40px; border-radius: 18px; }
  .contact-heading { font-size: clamp(1rem, 6vw, 2rem); margin-bottom: 32px; }
  .form-top-row { grid-template-columns: 1fr; gap: 16px; }
  .form-textarea { min-height: 160px; }
}
</style>
</head>
<body>

  <!-- Contact Form Card -->
  <div class="contact-card">

    <h1 class="contact-heading">CONTACT</h1>

    <form id="contactForm" novalidate>
      <!-- Top row: NAME | EMAIL | BUSINESS NAME -->
      <div class="form-top-row">
        <div class="form-field">
          <label class="form-label" for="name">NAME</label>
          <input class="form-input" type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <div class="form-field">
          <label class="form-label" for="email">EMAIL</label>
          <input class="form-input" type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-field">
          <label class="form-label" for="business">BUSINESS NAME</label>
          <input class="form-input" type="text" id="business" name="business" placeholder="Your business">
        </div>
      </div>

      <!-- INQUIRY textarea -->
      <div class="form-label inquiry-label">INQUIRY</div>
      <textarea class="form-textarea" id="inquiry" name="inquiry" placeholder="Tell us about your project, what you need, and any questions you have..." required></textarea>

      <!-- Submit -->
      <div class="form-submit-wrap">
        <button type="submit" class="btn-submit">SEND MESSAGE</button>
      </div>

      <div class="form-msg" id="formMsg"></div>
    </form>

  </div>

  <a href="/" class="back-link">← BACK TO HOME</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/assets/supabase.js"></script>
<script>
document.getElementById('contactForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var msg = document.getElementById('formMsg');
  msg.className = 'form-msg';
  msg.textContent = '';

  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var business = document.getElementById('business').value.trim();
  var inquiry  = document.getElementById('inquiry').value.trim();

  if (!name || !email || !inquiry) {
    msg.textContent = 'PLEASE FILL IN ALL REQUIRED FIELDS.';
    msg.className = 'form-msg error';
    return;
  }

  // Try Supabase if configured
  if (typeof sbReady === 'function' && sbReady()) {
    try {
      var result = await _sb.from('contact_submissions').insert([{
        name: name,
        email: email,
        business_name: business,
        inquiry: inquiry,
        submitted_at: new Date().toISOString()
      }]);
      if (result.error) throw result.error;
      msg.textContent = 'MESSAGE SENT! WE\'LL RESPOND WITHIN 1 BUSINESS DAY.';
      msg.className = 'form-msg success';
      document.getElementById('contactForm').reset();
      return;
    } catch(err) {
      console.error('Supabase error:', err);
    }
  }

  // Fallback: mailto
  var subject = encodeURIComponent('Contact from ' + (business || name) + ' via smallshoptees.com');
  var body = encodeURIComponent(
    'Name: ' + name + '\n' +
    'Email: ' + email + '\n' +
    'Business: ' + (business || 'N/A') + '\n\n' +
    'Inquiry:\n' + inquiry
  );
  window.location.href = 'mailto:(971) 727-5146@smallshoptees.com?subject=' + subject + '&body=' + body;
  msg.textContent = 'OPENING YOUR EMAIL CLIENT...';
  msg.className = 'form-msg success';
});
</script>
</body>
</html>
