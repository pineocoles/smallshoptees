<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact – Small Shop Tees</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --black:#000; --yellow:#FFE14D; --pink:#FF6EC7; --white:#f5f5f5; --gray:#1a1a1a; --muted:#666; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Rajdhani',sans-serif; background:var(--black); color:var(--white); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 80% 60%,rgba(255,255,255,.4) 0%,transparent 100%); }
  nav { position:sticky; top:0; z-index:1000; background:rgba(0,0,0,.92); backdrop-filter:blur(8px); border-bottom:2px solid var(--yellow); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:64px; }
  .nav-logo { font-family:'Press Start 2P',monospace; font-size:.85rem; color:var(--white); text-decoration:none; line-height:1.3; }
  .nav-logo span { color:var(--yellow); }
  .nav-back { font-family:'Press Start 2P',monospace; font-size:.45rem; color:rgba(245,245,245,.6); text-decoration:none; transition:color .2s; }
  .nav-back:hover { color:var(--yellow); }
  .page-wrap { position:relative; z-index:1; max-width:720px; margin:0 auto; padding:64px 32px 80px; }
  .page-tag { display:inline-flex; align-items:center; gap:8px; background:rgba(255,225,77,.1); border:1px solid rgba(255,225,77,.4); color:var(--yellow); font-family:'Press Start 2P',monospace; font-size:.45rem; letter-spacing:2px; padding:8px 16px; margin-bottom:24px; }
  .page-title { font-family:'Press Start 2P',monospace; font-size:1.1rem; color:var(--yellow); line-height:1.7; margin-bottom:12px; text-shadow:0 0 20px rgba(255,225,77,.3); }
  .page-sub { font-size:1.1rem; color:var(--muted); margin-bottom:48px; font-weight:500; }
  .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:32px; }
  .contact-tile { display:flex; flex-direction:column; align-items:center; gap:14px; background:var(--gray); border:2px solid rgba(255,225,77,.2); padding:36px 24px; text-decoration:none; color:var(--white); text-align:center; transition:border-color .2s,transform .2s; }
  .contact-tile:hover { border-color:var(--yellow); transform:translateY(-4px); }
  .ct-icon { font-size:2.5rem; }
  .ct-label { font-family:'Press Start 2P',monospace; font-size:.45rem; color:var(--yellow); letter-spacing:1px; }
  .ct-value { font-size:1.1rem; font-weight:700; color:rgba(245,245,245,.85); }
  .ct-hint { font-size:.88rem; color:var(--muted); font-weight:500; }
  .form-card { background:var(--gray); border:2px solid rgba(255,225,77,.15); padding:40px; }
  .form-card h2 { font-family:'Press Start 2P',monospace; font-size:.65rem; color:var(--yellow); margin-bottom:28px; line-height:1.8; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; font-family:'Press Start 2P',monospace; font-size:.4rem; color:var(--yellow); letter-spacing:1px; margin-bottom:8px; line-height:1.8; }
  .form-group input, .form-group textarea { width:100%; padding:14px 16px; background:#0d0d0d; border:2px solid rgba(255,225,77,.2); color:var(--white); font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:500; outline:none; transition:border-color .2s; }
  .form-group input:focus, .form-group textarea:focus { border-color:var(--yellow); }
  .btn-pixel { font-family:'Press Start 2P',monospace; font-size:.55rem; padding:18px 32px; background:var(--yellow); color:var(--black); border:3px solid var(--yellow); cursor:pointer; letter-spacing:1px; width:100%; box-shadow:4px 4px 0 #b89e00; transition:all .15s; margin-top:8px; }
  .btn-pixel:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 #b89e00; }
  footer { position:relative; z-index:1; background:#080808; border-top:2px solid rgba(255,225,77,.2); padding:24px 48px; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; }
  .footer-copy { font-family:'Press Start 2P',monospace; font-size:.38rem; color:var(--muted); letter-spacing:1px; line-height:1.8; }
  .footer-links { display:flex; gap:32px; }
  .footer-links a { font-family:'Press Start 2P',monospace; font-size:.45rem; color:rgba(245,245,245,.4); text-decoration:none; transition:color .2s; }
  .footer-links a:hover { color:var(--yellow); }
  @media(max-width:600px) { .contact-grid{grid-template-columns:1fr;} .page-wrap{padding:40px 20px;} footer{padding:24px;flex-direction:column;text-align:center;} }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">SMALL <span>SHOP TEES</span></a>
  <a href="index.html" class="nav-back">← BACK TO HOME</a>
</nav>
<div class="page-wrap">
  <div class="page-tag">📡 CONTACT</div>
  <div class="page-title">GET IN<br>TOUCH</div>
  <div class="page-sub">We're real humans. We actually answer.</div>
  <div class="contact-grid">
    <a href="tel:+15031234567" class="contact-tile">
      <div class="ct-icon">📞</div>
      <div class="ct-label">CALL US</div>
      <div class="ct-value">(503) 123-4567</div>
      <div class="ct-hint">Mon–Fri, 9am–5pm PST</div>
    </a>
    <a href="mailto:hello@smallshoptees.com" class="contact-tile">
      <div class="ct-icon">✉️</div>
      <div class="ct-label">EMAIL US</div>
      <div class="ct-value">hello@smallshoptees.com</div>
      <div class="ct-hint">We reply within a few hours</div>
    </a>
  </div>
  <div class="form-card">
    <h2>SEND US A MESSAGE</h2>
    <form action="https://formsubmit.co/pineocoles@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="Small Shop Tees — Contact form">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">

      <div class="form-group"><label for="contactName">NAME</label><input id="contactName" name="name" type="text" placeholder="Your name" required></div>
      <div class="form-group"><label for="contactEmail">EMAIL</label><input id="contactEmail" name="email" type="email" placeholder="you@yourbiz.com" required></div>
      <div class="form-group"><label for="contactMessage">MESSAGE</label><textarea id="contactMessage" name="message" rows="5" placeholder="What can we help you with?" required></textarea></div>
      <button class="btn-pixel" type="submit">📨 SEND MESSAGE</button>
    </form>
  </div>
</div>
<footer>
  <div class="footer-copy">© 2025 SMALL SHOP TEES · PORTLAND, OREGON</div>
  <div class="footer-links">
    <a href="about.html">ABOUT US</a>
    <a href="jobs.html">JOBS</a>
    <a href="contact.html">CONTACT</a>
  </div>
</footer>
</body>
</html>
