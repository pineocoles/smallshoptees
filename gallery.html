<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery – Small Shop Tees</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --black:#000; --yellow:#FFE14D; --pink:#FF6EC7; --white:#f5f5f5; --gray:#1a1a1a; --muted:#666; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Rajdhani',sans-serif; background:var(--black); color:var(--white); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0; background-image:radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 80% 60%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 45% 80%,rgba(255,225,77,.3) 0%,transparent 100%); }
  nav { position:sticky; top:0; z-index:1000; background:rgba(0,0,0,.92); backdrop-filter:blur(8px); border-bottom:2px solid var(--yellow); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:64px; }
  .nav-logo { font-family:'Press Start 2P',monospace; font-size:.85rem; color:var(--white); text-decoration:none; line-height:1.3; }
  .nav-logo span { color:var(--yellow); }
  .nav-back { font-family:'Press Start 2P',monospace; font-size:.45rem; color:rgba(245,245,245,.6); text-decoration:none; transition:color .2s; }
  .nav-back:hover { color:var(--yellow); }
  .page-wrap { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:64px 32px 80px; }
  .page-tag { display:inline-flex; align-items:center; gap:8px; background:rgba(255,225,77,.1); border:1px solid rgba(255,225,77,.4); color:var(--yellow); font-family:'Press Start 2P',monospace; font-size:.45rem; letter-spacing:2px; padding:8px 16px; margin-bottom:24px; }
  .page-title { font-family:'Press Start 2P',monospace; font-size:1.1rem; color:var(--yellow); line-height:1.7; margin-bottom:12px; text-shadow:0 0 20px rgba(255,225,77,.3); }
  .page-sub { font-size:1.1rem; color:var(--muted); margin-bottom:48px; font-weight:500; }
  .gallery-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .gallery-item { background:var(--gray); border:2px solid rgba(255,225,77,.15); aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; transition:border-color .2s,transform .2s; cursor:pointer; }
  .gallery-item:hover { border-color:var(--yellow); transform:scale(1.02); }
  .gallery-item .gi-icon { font-size:3rem; }
  .gallery-item .gi-label { font-family:'Press Start 2P',monospace; font-size:.4rem; color:var(--muted); letter-spacing:1px; }
  footer { position:relative; z-index:1; background:#080808; border-top:2px solid rgba(255,225,77,.2); padding:24px 48px; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; }
  .footer-copy { font-family:'Press Start 2P',monospace; font-size:.38rem; color:var(--muted); letter-spacing:1px; line-height:1.8; }
  .footer-links { display:flex; gap:32px; }
  .footer-links a { font-family:'Press Start 2P',monospace; font-size:.45rem; color:rgba(245,245,245,.4); text-decoration:none; transition:color .2s; }
  .footer-links a:hover { color:var(--yellow); }
  @media(max-width:700px) { .gallery-grid{grid-template-columns:1fr 1fr;} .page-wrap{padding:40px 20px;} footer{padding:24px;flex-direction:column;text-align:center;} }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">SMALL <span>SHOP TEES</span></a>
  <a href="index.html" class="nav-back">← BACK TO HOME</a>
</nav>
<div class="page-wrap">
  <div class="page-tag">🖼 GALLERY</div>
  <div class="page-title">OUR WORK</div>
  <div class="page-sub">A sample of shirts we've made for Portland businesses.</div>
  <div class="gallery-grid">
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">COFFEE SHOP</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">FOOD TRUCK</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">BREWERY</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">YOGA STUDIO</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">RETAIL SHOP</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">RESTAURANT</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">NONPROFIT</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">GYM</div></div>
    <div class="gallery-item"><div class="gi-icon">👕</div><div class="gi-label">MUSIC VENUE</div></div>
  </div>
</div>
<footer>
  <div class="footer-copy">© 2025 SMALL SHOP TEES · PORTLAND, OREGON</div>
  <div class="footer-links">
    <a href="about.html">ABOUT US</a>
    <a href="jobs.html">JOBS</a>
    <a href="contact.html">CONTACT</a>
  </div>
</footer>
</body>
</html>
