<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Quote – Small Shop Tees</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --black:#000; --yellow:#FFE14D; --pink:#FF6EC7; --white:#f5f5f5; --gray:#1a1a1a; --muted:#666; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Rajdhani',sans-serif; background:var(--black); color:var(--white); min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,.5) 0%,transparent 100%), radial-gradient(1px 1px at 70% 60%,rgba(255,255,255,.4) 0%,transparent 100%), radial-gradient(1px 1px at 45% 80%,rgba(255,225,77,.3) 0%,transparent 100%), radial-gradient(1px 1px at 85% 20%,rgba(255,255,255,.6) 0%,transparent 100%), radial-gradient(1px 1px at 30% 50%,rgba(255,255,255,.3) 0%,transparent 100%);
  }

  nav { position:sticky; top:0; z-index:1000; background:rgba(0,0,0,.92); backdrop-filter:blur(8px); border-bottom:2px solid var(--yellow); padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:64px; gap:16px; }
  .nav-logo { font-family:'Press Start 2P',monospace; font-size:.85rem; color:var(--white); text-decoration:none; line-height:1.3; }
  .nav-logo span { color:var(--yellow); }
  .nav-back { font-family:'Press Start 2P',monospace; font-size:.45rem; color:rgba(245,245,245,.6); text-decoration:none; letter-spacing:1px; transition:color .2s; }
  .nav-back:hover { color:var(--yellow); }

  .page-wrap { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:64px 32px 80px; }
  .page-tag { display:inline-flex; align-items:center; gap:8px; background:rgba(255,225,77,.1); border:1px solid rgba(255,225,77,.4); color:var(--yellow); font-family:'Press Start 2P',monospace; font-size:.45rem; letter-spacing:2px; padding:8px 16px; margin-bottom:24px; }
  .page-title { font-family:'Press Start 2P',monospace; font-size:1.1rem; color:var(--yellow); line-height:1.7; margin-bottom:12px; text-shadow:0 0 20px rgba(255,225,77,.3); }
  .page-sub { font-size:1.1rem; color:var(--muted); margin-bottom:48px; font-weight:500; }

  .form-card { background:var(--gray); border:2px solid rgba(255,225,77,.2); padding:40px; }
  .form-group { margin-bottom:24px; }
  .form-group label { display:block; font-family:'Press Start 2P',monospace; font-size:.42rem; color:var(--yellow); letter-spacing:1px; margin-bottom:10px; line-height:1.8; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:14px 16px; background:#0d0d0d; border:2px solid rgba(255,225,77,.2);
    color:var(--white); font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:500;
    outline:none; transition:border-color .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--yellow); }
  .form-group select option { background:#111; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .btn-pixel { font-family:'Press Start 2P',monospace; font-size:.55rem; padding:18px 32px; background:var(--yellow); color:var(--black); border:3px solid var(--yellow); cursor:pointer; letter-spacing:1px; width:100%; box-shadow:4px 4px 0 #b89e00; transition:all .15s; margin-top:8px; }
  .btn-pixel:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 #b89e00; }

  footer { position:relative; z-index:1; background:#080808; border-top:2px solid rgba(255,225,77,.2); padding:24px 48px; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; }
  .footer-copy { font-family:'Press Start 2P',monospace; font-size:.38rem; color:var(--muted); letter-spacing:1px; line-height:1.8; }
  .footer-links { display:flex; gap:32px; }
  .footer-links a { font-family:'Press Start 2P',monospace; font-size:.45rem; color:rgba(245,245,245,.4); text-decoration:none; transition:color .2s; }
  .footer-links a:hover { color:var(--yellow); }
  @media(max-width:600px) { .form-row{grid-template-columns:1fr;} .page-wrap{padding:40px 20px;} footer{padding:24px;flex-direction:column;text-align:center;} }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">SMALL <span>SHOP TEES</span></a>
  <a href="index.html" class="nav-back">← BACK TO HOME</a>
</nav>

<div class="page-wrap">
  <div class="page-tag">🧾 FREE QUOTE</div>
  <div class="page-title">REQUEST<br>A QUOTE</div>
  <div class="page-sub">Fill this out and we'll get back to you within a few hours.</div>

  <div class="form-card">
    <form action="https://formsubmit.co/pineocoles@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="Small Shop Tees — Quote request">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="false">

      <div class="form-row">
        <div class="form-group">
          <label for="quoteName">YOUR NAME</label>
          <input id="quoteName" name="name" type="text" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label for="quoteBusiness">BUSINESS NAME</label>
          <input id="quoteBusiness" name="business_name" type="text" placeholder="Acme Coffee Co.">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="quoteEmail">EMAIL</label>
          <input id="quoteEmail" name="email" type="email" placeholder="you@yourbiz.com" required>
        </div>
        <div class="form-group">
          <label for="quotePhone">PHONE</label>
          <input id="quotePhone" name="phone" type="tel" placeholder="(503) 000-0000">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="quoteQty">QUANTITY NEEDED</label>
          <select id="quoteQty" name="quantity">
            <option>1–11 shirts</option>
            <option>12–24 shirts</option>
            <option>25–49 shirts</option>
            <option>50–99 shirts</option>
            <option>100+ shirts</option>
          </select>
        </div>
        <div class="form-group">
          <label for="quoteStyle">SHIRT STYLE</label>
          <select id="quoteStyle" name="shirt_style">
            <option>Standard T-Shirt</option>
            <option>Premium Tee</option>
            <option>Long Sleeve</option>
            <option>Hoodie</option>
            <option>Not sure yet</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="quoteArtwork">DO YOU HAVE ARTWORK?</label>
        <select id="quoteArtwork" name="artwork_status">
          <option>Yes – I'll send my files</option>
          <option>No – I need a custom design</option>
          <option>I have a rough idea / logo only</option>
        </select>
      </div>

      <div class="form-group">
        <label for="quoteMore">TELL US MORE (OPTIONAL)</label>
        <textarea id="quoteMore" name="details" rows="4" placeholder="Colors, timeline, special requests, anything you want us to know..."></textarea>
      </div>

      <button class="btn-pixel" type="submit">🚀 SUBMIT QUOTE REQUEST</button>
    </form>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2025 SMALL SHOP TEES · PORTLAND, OREGON</div>
  <div class="footer-links">
    <a href="about.html">ABOUT US</a>
    <a href="jobs.html">JOBS</a>
    <a href="contact.html">CONTACT</a>
  </div>
</footer>
</body>
</html>
